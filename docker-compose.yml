version: "3.9"

services:
  db:
    image: postgres:16
    container_name: stay_alive_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stayalive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stayalive}
      POSTGRES_DB: ${POSTGRES_DB:-stayalive}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
